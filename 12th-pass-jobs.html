<!DOCTYPE html>
<html>
<head>

<title>12th Pass Government Jobs 2026</title>

<meta name="description" content="Latest 12th pass government jobs in India. रेलवे, पुलिस, सरकारी भर्ती updates.">

</head>

<body>

<h1>12th Pass Government Jobs</h1>

<div id="jobs">Loading jobs...</div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQE0orW_Uem5Vi736r-rSdwHKpJLmCmHh9IhVjIs2au5nnhMjhWv8Pp1X-yKHRlo-LhHuzHc9dgHPSH/pub?output=csv";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    let rows = data.trim().split("\n").slice(1);
    let html = "";

    rows.forEach(row => {

        let cols = row.split(",");
        let title = cols[0];
        let desc = cols[1];
        let link = cols[2];

        // 🔥 FILTER LOGIC
        if(title.toLowerCase().includes("12th")) || desc.toLowerCase().includes("10th")){

            html += `
            <div style="border:1px solid #ccc; padding:10px; margin:10px;">
                <h3>${title}</h3>
                <p>${desc}</p>
                <a href="${link}" target="_blank">Apply</a>
            </div>
            `;
        }
    });

    document.getElementById("jobs").innerHTML = html || "No jobs found";

});

</script>

</body>
</html>
