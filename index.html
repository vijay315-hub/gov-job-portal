<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Portal</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f4f6f8;
}

/* HEADER */
header{
    background:#111827;
    color:white;
    padding:25px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:26px;
}

header p{
    margin-top:5px;
    color:#cbd5e1;
}

/* SEARCH */
.search-box{
    text-align:center;
    margin:20px;
}

.search-box input{
    width:60%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    outline:none;
}

/* FILTER BUTTONS */
.filters{
    text-align:center;
    margin-bottom:15px;
}

.filters button{
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:20px;
    background:#e5e7eb;
    cursor:pointer;
}

.filters button:hover{
    background:#111827;
    color:white;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:850px;
    margin:auto;
}

/* CARD */
.card{
    background:white;
    padding:18px;
    margin:12px 0;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    position:relative;
}

.card h3{
    margin:0;
    color:#111827;
}

.card p{
    color:#6b7280;
    margin:6px 0;
}

/* NEW BADGE */
.badge{
    position:absolute;
    top:10px;
    right:10px;
    background:#22c55e;
    color:white;
    font-size:12px;
    padding:3px 8px;
    border-radius:20px;
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:8px;
    padding:7px 12px;
    background:#111827;
    color:white;
    border-radius:8px;
    text-decoration:none;
    font-size:13px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    color:#6b7280;
    font-size:13px;
}
</style>
</head>

<body>

<header>
<h1>Job Portal</h1>
<p>Clean • Fast • Updated Jobs</p>
</header>

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="search" placeholder="Search jobs...">
</div>

<!-- FILTERS -->
<div class="filters">
<button onclick="filterJobs('all')">All</button>
<button onclick="filterJobs('gov')">Gov Jobs</button>
<button onclick="filterJobs('10th')">10th</button>
<button onclick="filterJobs('12th')">12th</button>
<button onclick="filterJobs('grad')">Graduate</button>
</div>

<!-- JOB LIST -->
<div class="container" id="jobs">Loading jobs...</div>

<footer>
© 2026 Job Portal | Built by Vijay
</footer>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQE0orW_Uem5Vi736r-rSdwHKpJLmCmHh9IhVjIs2au5nnhMjhWv8Pp1X-yKHRlo-LhHuzHc9dgHPSH/pub?output=csv";

let allJobs = [];

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    let rows = data.trim().split("\n").slice(1);

    rows.forEach(row => {
        let cols = row.split(",");

        allJobs.push({
            title: cols[0] || "",
            desc: cols[1] || "",
            link: cols[2] || "",
            date: cols[3] || "",
        });
    });

    renderJobs(allJobs);
});

function renderJobs(jobs){

    let html = "";

    jobs.forEach((job,index) => {

        let isNew = index < 2 ? "<span class='badge'>NEW</span>" : "";

        html += `
        <div class="card">
            ${isNew}
            <h3>${job.title}</h3>
            <p>${job.desc}</p>
            <small>${job.date}</small><br>
            <a class="btn" href="${job.link}" target="_blank">Apply</a>
        </div>
        `;
    });

    document.getElementById("jobs").innerHTML = html;
}

/* SEARCH */
document.getElementById("search").addEventListener("input", function(){
    let value = this.value.toLowerCase();

    let filtered = allJobs.filter(job =>
        job.title.toLowerCase().includes(value)
    );

    renderJobs(filtered);
});

/* SIMPLE FILTER (basic demo) */
function filterJobs(type){

    if(type === "all"){
        renderJobs(allJobs);
    } else {
        let filtered = allJobs.filter(job =>
            job.title.toLowerCase().includes(type)
        );

        renderJobs(filtered);
    }
}

</script>

</body>
</html>
