<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Job Updates</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

header {
    background: #111;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    width: 90%;
    max-width: 800px;
    margin: auto;
    padding-top: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

a {
    background: black;
    color: white;
    padding: 6px 10px;
    text-decoration: none;
    border-radius: 5px;
}
</style>

</head>

<body>

<header>
<h1>Job Updates Portal</h1>
<p>Auto Updated from Google Sheet</p>
</header>

<div class="container" id="jobs">
Loading jobs...
</div>

<script>

// 🔴 PASTE YOUR GOOGLE SHEET CSV LINK HERE
const sheetURL = "https://docs.google.com/spreadsheets/d/1PcUU-H3VQ1D66wSMYo9FmTZrs009c9epdbznHl7Pi8U/edit?usp=sharing";

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    let rows = data.split("\n").slice(1);
    let html = "";

    rows.forEach(row => {
        let cols = row.split(",");

        let title = cols[0];
        let desc = cols[1];
        let link = cols[2];
        let date = cols[3];

        if(title) {
            html += `
            <div class="card">
                <h3>${title}</h3>
                <p>${desc}</p>
                <small>${date}</small><br><br>
                <a href="${link}" target="_blank">Apply</a>
            </div>
            `;
        }
    });

    document.getElementById("jobs").innerHTML = html;
});

</script>

</body>
</html>
